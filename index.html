<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treatmares — Webcomic Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bebas+Neue&family=Black+Han+Sans&family=Permanent+Marker&family=Oswald:wght@700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #ff4fd8;
  --cyan: #00eaff;
  --yellow: #ffe600;
  --red: #ff1f1f;
  --dark: #0d0020;
  --purple: #1a0033;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ===== INTRO SCREEN ===== */
#intro-screen {
  position: fixed; inset: 0;
  z-index: 9999;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: none;
}

#intro-screen.hidden {
  pointer-events: none;
  animation: intro-exit 0.7s cubic-bezier(.7,0,.3,1) forwards;
}

@keyframes intro-exit {
  0%   { clip-path: inset(0 0 0 0); opacity: 1; }
  100% { clip-path: inset(50% 0 50% 0); opacity: 0; }
}

.intro-panels {
  position: absolute; inset: 0;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 4px;
  opacity: 0;
  animation: panels-in 0.5s ease-out 0.1s forwards;
}

@keyframes panels-in {
  from { opacity: 0; transform: scale(1.08); }
  to   { opacity: 1; transform: scale(1); }
}

.intro-panel {
  position: relative;
  overflow: hidden;
  background: var(--c, #1a0033);
}

.intro-panel-content {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(2em, 5vw, 4em);
  opacity: 0;
  animation: panel-text-in 0.35s ease-out forwards;
  animation-delay: var(--dt, 0.4s);
}

@keyframes panel-text-in {
  from { opacity: 0; transform: scale(0.3) rotate(-15deg); }
  to   { opacity: 1; transform: scale(1) rotate(0deg); }
}

.intro-logo-container {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
  flex-direction: column; gap: 20px;
  opacity: 0;
  animation: logo-appear 0.5s ease-out 1.1s forwards;
}

@keyframes logo-appear {
  from { opacity: 0; transform: scale(0.6) translateY(30px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.intro-logo-text {
  font-family: 'Bangers', cursive;
  font-size: clamp(4em, 10vw, 9em);
  letter-spacing: 10px;
  color: var(--yellow);
  text-shadow: 6px 6px 0 var(--pink), 12px 12px 0 rgba(255,79,216,0.35), 0 0 80px rgba(255,230,0,0.6);
  animation: logo-pulse 1.5s ease-in-out 1.5s infinite alternate;
}

@keyframes logo-pulse {
  from { text-shadow: 6px 6px 0 var(--pink), 0 0 60px rgba(255,230,0,0.4); }
  to   { text-shadow: 6px 6px 0 var(--pink), 0 0 130px rgba(255,230,0,1); }
}

.intro-sub {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1em, 2.5vw, 1.8em);
  letter-spacing: 8px;
  color: var(--cyan);
  text-shadow: 0 0 20px var(--cyan);
}

.intro-skip {
  position: absolute;
  bottom: 35px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1em;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.35);
  cursor: pointer;
  animation: blink-skip 1.4s ease-in-out 1.5s infinite alternate;
}

@keyframes blink-skip {
  from { opacity: 0.25; } to { opacity: 0.85; }
}

.intro-skip:hover { color: var(--pink); }

/* Intro scanlines overlay */
#intro-screen::after {
  content: "";
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
  pointer-events: none; z-index: 3;
}

/* ===== CURSOR ===== */
#cursor-dot {
  position: fixed;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--pink);
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
  mix-blend-mode: screen;
  box-shadow: 0 0 14px var(--pink), 0 0 28px rgba(255,79,216,0.5);
  transition: background 0.3s, box-shadow 0.3s;
}

.ink-trail {
  position: fixed;
  pointer-events: none;
  z-index: 99998;
  transform: translate(-50%, -50%);
  animation: ink-fade 0.65s ease-out forwards;
  mix-blend-mode: screen;
}

@keyframes ink-fade {
  0%   { opacity: 0.85; transform: translate(-50%,-50%) scale(1) rotate(var(--rot,0deg)); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(0.1) rotate(var(--rot,0deg)); }
}

/* ===== BG CANVAS ===== */
#bg-canvas {
  position: fixed; inset: 0;
  z-index: 0;
  pointer-events: none;
  width: 100%; height: 100%;
}

body {
  font-family: 'Nunito', sans-serif;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(120,0,255,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(255,79,216,0.15) 0%, transparent 55%),
    linear-gradient(160deg, #08001a 0%, #0d0020 40%, #110030 70%, #080015 100%);
  background-attachment: fixed;
  color: #fff;
  overflow-x: hidden;
  min-height: 100vh;
  cursor: none;
}

/* CRT scanlines */
body::before {
  content: "";
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.055) 3px, rgba(0,0,0,0.055) 4px);
  pointer-events: none; z-index: 50;
  animation: scan-drift 10s linear infinite;
}

@keyframes scan-drift {
  0%   { background-position: 0 0; }
  100% { background-position: 0 400px; }
}

/* Halftone dots */
body::after {
  content: "";
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(255,79,216,0.055) 1.5px, transparent 1.5px);
  background-size: 38px 38px;
  pointer-events: none; z-index: 0;
  animation: halftone-drift 22s linear infinite;
}

@keyframes halftone-drift {
  0%   { background-position: 0 0; }
  100% { background-position: 38px 38px; }
}

/* Speed ring */
#speed-ring {
  position: fixed; inset: 0;
  background: repeating-conic-gradient(
    from 0deg at 50% 50%,
    rgba(255,79,216,0.016) 0deg 2deg,
    transparent 2deg 8deg
  );
  pointer-events: none; z-index: 0;
}

/* ===== PARALLAX CONTAINER ===== */
#parallax-root {
  position: relative; z-index: 1;
  will-change: transform;
}

/* ===== HEADER ===== */
header {
  position: relative; z-index: 10;
  padding: 18px 40px;
  background: linear-gradient(90deg, #0a0015, #1a0033 40%, #0a0015);
  border-bottom: 4px solid var(--pink);
  display: flex; align-items: center; gap: 20px;
  box-shadow: 0 4px 40px rgba(255,79,216,0.5);
}

.site-logo {
  height: 90px; width: auto;
  filter: drop-shadow(0 0 18px rgba(255,79,216,0.7)) drop-shadow(0 0 35px rgba(180,100,255,0.4));
  transition: filter 0.3s;
}
.site-logo:hover {
  filter: drop-shadow(0 0 28px rgba(255,79,216,1)) drop-shadow(0 0 55px rgba(0,234,255,0.6));
}

.logo-fallback {
  font-family: 'Bangers', cursive;
  font-size: 2.5em;
  letter-spacing: 6px;
  color: var(--pink);
  text-shadow: 0 0 20px var(--pink);
}

.header-badge {
  margin-left: auto;
  font-family: 'Bangers', cursive;
  font-size: 1.1em;
  letter-spacing: 2px;
  color: var(--pink);
  border: 2px solid var(--pink);
  padding: 6px 18px;
  border-radius: 4px;
  text-shadow: 0 0 10px var(--pink);
  animation: pulse-border 2s ease-in-out infinite;
}

@keyframes pulse-border {
  0%,100% { box-shadow: 0 0 10px rgba(255,79,216,0.3); }
  50% { box-shadow: 0 0 28px rgba(255,79,216,0.9), inset 0 0 12px rgba(255,79,216,0.15); }
}

/* ===== TABS ===== */
.tabs {
  position: relative; z-index: 9;
  display: flex; gap: 10px; justify-content: center;
  padding: 14px 20px;
  background: linear-gradient(90deg, rgba(0,0,0,0.95), rgba(40,0,70,0.8), rgba(0,0,0,0.95));
  border-bottom: 3px solid var(--cyan);
  flex-wrap: wrap;
}

.tab-btn {
  font-family: 'Bangers', cursive;
  font-size: 1.3em;
  letter-spacing: 3px;
  padding: 8px 30px;
  border: 3px solid var(--pink);
  background: transparent;
  color: var(--pink);
  border-radius: 4px;
  cursor: none;
  transition: all 0.25s;
  text-shadow: 0 0 10px rgba(255,79,216,0.5);
  position: relative; overflow: hidden;
}

.tab-btn::after {
  content: "";
  position: absolute; inset: 0;
  background: var(--pink);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s;
  z-index: -1;
}

.tab-btn:hover { color: #000; text-shadow: none; }
.tab-btn:hover::after { transform: scaleX(1); }
.tab-btn.active { background: var(--pink); color: #000; text-shadow: none; box-shadow: 0 0 25px rgba(255,79,216,0.8); }

/* ===== MAIN ===== */
main { position: relative; z-index: 1; min-height: 80vh; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ===== BOOKSHELF ===== */
.bookshelf-container {
  padding: 50px 30px 30px;
  max-width: 1300px;
  margin: 0 auto;
}

.shelf-label {
  font-family: 'Bangers', cursive;
  font-size: 1.5em;
  letter-spacing: 5px;
  color: var(--cyan);
  text-shadow: 0 0 15px var(--cyan);
  margin-bottom: 25px;
  display: flex; align-items: center; gap: 15px;
}
.shelf-label::before, .shelf-label::after { content: ""; flex: 1; height: 2px; }
.shelf-label::before { background: linear-gradient(90deg, transparent, var(--cyan)); }
.shelf-label::after  { background: linear-gradient(90deg, var(--cyan), transparent); }

.shelf-row {
  position: relative;
  margin-bottom: 60px;
  perspective: 900px;
}

.shelf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 0;
  padding: 20px 20px 0;
  background: linear-gradient(180deg, rgba(20,5,40,0.4) 0%, rgba(20,5,40,0.2) 100%);
  border-radius: 4px 4px 0 0;
  align-items: flex-end;
  min-height: 280px;
}

.shelf-plank {
  height: 22px;
  background: linear-gradient(180deg, #5c3a1e 0%, #3d2410 40%, #2a1a0c 100%);
  border-radius: 0 0 4px 4px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.8), inset 0 2px 4px rgba(255,200,100,0.15);
  position: relative;
}
.shelf-plank::before {
  content: "";
  position: absolute; inset: 0;
  background: repeating-linear-gradient(90deg, transparent 0px, transparent 80px, rgba(0,0,0,0.1) 80px, rgba(0,0,0,0.1) 82px);
  border-radius: inherit;
}
.shelf-plank::after {
  content: "";
  position: absolute;
  bottom: -15px; left: 0; right: 0;
  height: 15px;
  background: linear-gradient(180deg, rgba(0,0,0,0.5), transparent);
  pointer-events: none;
}

/* ===== BOOK SPINE — 3D ===== */
.book-spine {
  position: relative;
  cursor: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: z-index 0s;
  transform-origin: bottom center;
  padding: 0 4px;
}

.book-spine:hover { z-index: 5; }

.book-cover {
  width: 100%;
  max-width: 150px;
  height: 220px;
  border-radius: 2px 8px 8px 2px;
  overflow: hidden;
  position: relative;
  box-shadow:
    -4px 0 8px rgba(0,0,0,0.8),
    4px 0 12px rgba(0,0,0,0.4),
    inset -3px 0 6px rgba(0,0,0,0.5),
    inset 3px 0 6px rgba(255,255,255,0.05);
  border-left: 4px solid rgba(255,255,255,0.1);
  transition: box-shadow 0.3s, transform 0.18s cubic-bezier(.23,1,.32,1);
  transform-style: preserve-3d;
  will-change: transform;
}

.book-cover img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: filter 0.3s;
}

.book-spine:hover .book-cover img {
  filter: brightness(1.25) saturate(1.4);
}

/* Spine shine */
.book-cover::before {
  content: "";
  position: absolute; top: 0; left: 0;
  width: 25%; height: 100%;
  background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
  z-index: 2; pointer-events: none;
}

.book-spine:hover .book-cover {
  box-shadow:
    -4px 0 8px rgba(0,0,0,0.8),
    4px 0 30px rgba(255,79,216,0.7),
    0 0 40px rgba(0,234,255,0.4),
    0 -15px 30px rgba(255,230,0,0.2),
    inset -3px 0 6px rgba(0,0,0,0.5);
}

/* Speech bubble */
.book-bubble {
  position: absolute;
  bottom: calc(100% + 14px);
  left: 50%;
  transform: translateX(-50%) scale(0) rotate(-3deg);
  transform-origin: bottom center;
  background: var(--yellow);
  color: #000;
  font-family: 'Permanent Marker', cursive;
  font-size: 0.7em;
  line-height: 1.3;
  padding: 9px 13px;
  border-radius: 10px;
  border: 3px solid #000;
  box-shadow: 3px 3px 0 #000;
  width: 145px;
  text-align: center;
  z-index: 20;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  white-space: normal;
}

.book-bubble::after {
  content: "";
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 9px solid transparent;
  border-top-color: #000;
}

.book-bubble::before {
  content: "";
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%) translateY(-3px);
  border: 9px solid transparent;
  border-top-color: var(--yellow);
  z-index: 1;
}

.book-spine:hover .book-bubble {
  transform: translateX(-50%) scale(1) rotate(-3deg);
}

.book-title-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.72em;
  letter-spacing: 1.5px;
  color: var(--cyan);
  text-align: center;
  margin-top: 8px;
  text-shadow: 0 0 8px var(--cyan);
  max-width: 130px;
  line-height: 1.2;
}

/* CS cover */
.cs-cover {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
  position: relative; overflow: hidden;
}

.cs-cover::after {
  content: "?";
  font-family: 'Bangers', cursive;
  font-size: 5em;
  color: rgba(255,79,216,0.15);
  position: absolute;
  bottom: -10px; right: 5px;
}

.cs-dots {
  display: grid;
  grid-template-columns: repeat(3,8px);
  gap: 5px;
}

.cs-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--pink);
  opacity: 0.3;
  animation: cs-pulse 1.5s ease-in-out infinite;
}
.cs-dot:nth-child(2) { animation-delay: 0.2s; background: var(--cyan); }
.cs-dot:nth-child(3) { animation-delay: 0.4s; background: var(--yellow); }
.cs-dot:nth-child(4) { animation-delay: 0.15s; background: var(--yellow); }
.cs-dot:nth-child(5) { animation-delay: 0.35s; background: var(--pink); }
.cs-dot:nth-child(6) { animation-delay: 0.55s; background: var(--cyan); }
.cs-dot:nth-child(7) { animation-delay: 0.3s; background: var(--cyan); }
.cs-dot:nth-child(8) { animation-delay: 0.5s; background: var(--yellow); }
.cs-dot:nth-child(9) { animation-delay: 0.7s; background: var(--pink); }

@keyframes cs-pulse {
  0%,100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.3); }
}

.cs-text {
  font-family: 'Bangers', cursive;
  font-size: 0.9em;
  letter-spacing: 2px;
  color: var(--pink);
  text-shadow: 0 0 10px var(--pink);
  z-index: 1;
}

/* ===== DETAIL VIEW ===== */
#detail-overlay {
  position: fixed; inset: 0;
  z-index: 100;
  pointer-events: none;
  opacity: 0;
}

#detail-overlay.open {
  pointer-events: all;
  opacity: 1;
}

.detail-curtain {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.93);
  opacity: 0;
  transition: opacity 0.5s;
}

#detail-overlay.open .detail-curtain { opacity: 1; }

.bar-top, .bar-bottom {
  position: absolute; left: 0; right: 0;
  height: 90px;
  display: flex; align-items: center;
  overflow: hidden; z-index: 3;
}

.bar-top {
  top: 0;
  transform: translateY(-100%);
  transition: transform 0.5s cubic-bezier(.23,1,.32,1);
  background: linear-gradient(90deg, #000, #0a0020, #000);
  border-bottom: 4px solid var(--pink);
}

.bar-bottom {
  bottom: 0;
  transform: translateY(100%);
  transition: transform 0.5s cubic-bezier(.23,1,.32,1);
  background: linear-gradient(90deg, #000, #0a0020, #000);
  border-top: 4px solid var(--cyan);
  justify-content: flex-end;
}

#detail-overlay.open .bar-top { transform: translateY(0); }
#detail-overlay.open .bar-bottom { transform: translateY(0); }

.bar-top-inner {
  display: flex; align-items: center;
  width: 100%; padding: 0 40px; gap: 20px;
}

.bar-title {
  font-family: 'Bangers', cursive;
  font-size: 3em;
  letter-spacing: 6px;
  color: var(--yellow);
  text-shadow: 3px 3px 0 var(--pink), 6px 6px 0 rgba(255,79,216,0.3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}

.bar-scrolling-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1em; letter-spacing: 4px;
  color: var(--cyan); opacity: 0.45;
  white-space: nowrap;
  animation: scroll-marquee 12s linear infinite;
  flex-shrink: 0;
}

@keyframes scroll-marquee {
  0% { transform: translateX(0); } 100% { transform: translateX(-100%); }
}

.bar-bottom-inner {
  display: flex; align-items: center;
  width: 100%; padding: 0 40px; gap: 20px;
  justify-content: flex-end;
}

.bar-category {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3em; letter-spacing: 5px;
  color: var(--cyan); text-shadow: 0 0 15px var(--cyan);
}

.detail-content {
  position: absolute; inset: 90px;
  display: flex; align-items: center; justify-content: center; gap: 60px;
  z-index: 2; opacity: 0; transform: scale(0.9);
  transition: all 0.5s 0.3s cubic-bezier(.23,1,.32,1);
}

#detail-overlay.open .detail-content { opacity: 1; transform: scale(1); }

.detail-book { flex-shrink: 0; width: 280px; position: relative; }

.detail-book-cover {
  width: 100%;
  aspect-ratio: 2/3;
  border-radius: 4px 12px 12px 4px;
  overflow: hidden;
  box-shadow:
    -8px 4px 20px rgba(0,0,0,0.9),
    8px 0 40px rgba(255,79,216,0.5),
    0 0 60px rgba(0,234,255,0.3);
  animation: float-book 3s ease-in-out infinite;
  border-left: 8px solid rgba(255,255,255,0.08);
}

@keyframes float-book {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50% { transform: translateY(-12px) rotate(1deg); }
}

.detail-book-cover img { width: 100%; height: 100%; object-fit: cover; }

.detail-info {
  max-width: 420px;
  display: flex; flex-direction: column; gap: 20px;
}

.detail-comic-title {
  font-family: 'Bangers', cursive;
  font-size: 3.5em; letter-spacing: 4px;
  color: var(--yellow); line-height: 0.95;
  text-shadow: 4px 4px 0 var(--pink);
}

.detail-coming-soon-badge {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3em; letter-spacing: 4px;
  color: #000; background: var(--yellow);
  padding: 6px 18px; border-radius: 3px;
  animation: badge-shake 0.5s ease-in-out infinite alternate;
  box-shadow: 4px 4px 0 var(--pink), 0 0 22px rgba(255,230,0,0.5);
}

@keyframes badge-shake {
  0% { transform: rotate(-1deg) scale(1); }
  100% { transform: rotate(1deg) scale(1.03); }
}

.detail-desc {
  font-size: 1em; color: rgba(255,255,255,0.75);
  line-height: 1.7; font-weight: 700;
}

.btn-read {
  font-family: 'Bangers', cursive;
  font-size: 2em; letter-spacing: 6px;
  padding: 14px 50px;
  background: transparent;
  border: 4px solid var(--cyan);
  color: var(--cyan); cursor: none;
  border-radius: 4px;
  position: relative; overflow: hidden;
  transition: all 0.3s;
  text-shadow: 0 0 15px var(--cyan);
  align-self: flex-start;
  box-shadow: 0 0 20px rgba(0,234,255,0.3), inset 0 0 20px rgba(0,234,255,0.05);
}

.btn-read::before {
  content: "";
  position: absolute; inset: 0;
  background: var(--cyan);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.3s; z-index: -1;
}

.btn-read:hover { color: #000; text-shadow: none; box-shadow: 0 0 45px rgba(0,234,255,0.9); }
.btn-read:hover::before { transform: scaleX(1); }

.btn-read.disabled {
  border-color: rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.3);
  text-shadow: none; box-shadow: none; cursor: none;
}
.btn-read.disabled::before { display: none; }

.btn-close {
  position: absolute; top: 100px; right: 30px; z-index: 10;
  font-family: 'Bangers', cursive; font-size: 1.5em; letter-spacing: 2px;
  color: rgba(255,255,255,0.5); background: transparent;
  border: 2px solid rgba(255,255,255,0.2);
  padding: 8px 20px; border-radius: 4px; cursor: none;
  transition: all 0.25s;
}
.btn-close:hover { color: var(--pink); border-color: var(--pink); box-shadow: 0 0 22px rgba(255,79,216,0.5); }

/* ===== FLASH ===== */
.flash-overlay {
  position: fixed; inset: 0; z-index: 200;
  pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
}

.flash-overlay.boom { animation: flash-out 0.8s ease-out forwards; }

@keyframes flash-out {
  0% { opacity: 1; background: var(--yellow); }
  25% { opacity: 0.8; background: var(--pink); }
  50% { opacity: 0.6; background: var(--cyan); }
  100% { opacity: 0; }
}

.flash-text {
  font-family: 'Bangers', cursive;
  font-size: clamp(4em, 10vw, 8em);
  color: #000; letter-spacing: 8px;
  text-shadow: 6px 6px 0 rgba(0,0,0,0.3);
  transform: rotate(-5deg);
  animation: flash-text-in 0.3s ease-out;
}

@keyframes flash-text-in {
  0% { transform: rotate(-5deg) scale(0.3); }
  70% { transform: rotate(-5deg) scale(1.15); }
  100% { transform: rotate(-5deg) scale(1); }
}

.speed-lines {
  position: absolute; inset: 0;
  background: repeating-conic-gradient(rgba(0,0,0,0.12) 0deg, rgba(0,0,0,0.12) 1deg, transparent 1deg, transparent 5deg);
  animation: spin-lines 0.5s linear;
}

@keyframes spin-lines {
  0% { transform: rotate(0deg); } 100% { transform: rotate(30deg); }
}

/* ===== CS DETAIL ===== */
.cs-detail-art {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #0a0020, #1a0040, #0f0030);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}

.cs-detail-question {
  font-family: 'Bangers', cursive;
  font-size: 8em; color: rgba(255,79,216,0.2);
  position: absolute;
  animation: q-float 2s ease-in-out infinite;
}

@keyframes q-float {
  0%,100% { transform: scale(1) rotate(-5deg); }
  50% { transform: scale(1.1) rotate(5deg); }
}

.cs-detail-halftone {
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(255,79,216,0.08) 2px, transparent 2px);
  background-size: 20px 20px;
}

/* ===== INK SPLAT PARTICLES ===== */
.particle {
  position: fixed;
  pointer-events: none; z-index: 9999;
  animation: particle-fly 0.85s ease-out forwards;
}

@keyframes particle-fly {
  0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.05) rotate(var(--drot,180deg)); }
}

/* ===== FOOTER ===== */
footer {
  position: relative; z-index: 1;
  text-align: center; padding: 22px 30px;
  background: linear-gradient(90deg, rgba(0,0,0,0.95), rgba(40,0,70,0.8), rgba(0,0,0,0.95));
  border-top: 3px solid var(--pink);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1em; letter-spacing: 5px;
  color: var(--cyan); text-shadow: 0 0 10px var(--cyan);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .shelf-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
  .book-cover { height: 170px; }
  .detail-content { flex-direction: column; gap: 25px; padding: 10px; }
  .detail-book { width: 160px; }
  .detail-comic-title { font-size: 2.2em; }
  .bar-title { font-size: 1.8em; }
  .btn-read { font-size: 1.4em; }
  .bar-top, .bar-bottom { height: 70px; }
  .detail-content { inset: 70px; }
  .btn-close { top: 80px; }
}
</style>

<script>
// ===== WEB AUDIO ENGINE (zero external files) =====
let audioCtx = null;
function getAudio() {
  if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  return audioCtx;
}

function playWhoosh() {
  try {
    const ctx = getAudio(); if (!ctx) return;
    const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.22), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.8) * 0.55;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const bpf = ctx.createBiquadFilter(); bpf.type='bandpass';
    bpf.frequency.setValueAtTime(900, ctx.currentTime);
    bpf.frequency.exponentialRampToValueAtTime(180, ctx.currentTime+0.22);
    bpf.Q.value = 1.2;
    src.connect(bpf); bpf.connect(ctx.destination); src.start();
  } catch(e){}
}

function playPop() {
  try {
    const ctx = getAudio(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(700, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(180, ctx.currentTime+0.1);
    g.gain.setValueAtTime(0.35, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.1);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.1);
  } catch(e){}
}

function playBoom() {
  try {
    const ctx = getAudio(); if (!ctx) return;
    const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.28), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 2.5);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const lpf = ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=280;
    const g = ctx.createGain(); g.gain.value = 0.75;
    src.connect(lpf); lpf.connect(g); g.connect(ctx.destination); src.start();
  } catch(e){}
}

function playTabClick() {
  try {
    const ctx = getAudio(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(480, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(960, ctx.currentTime+0.07);
    g.gain.setValueAtTime(0.12, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.09);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.09);
  } catch(e){}
}

function playHover() {
  try {
    const ctx = getAudio(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = 440 + Math.random()*200;
    g.gain.setValueAtTime(0.07, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.06);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.06);
  } catch(e){}
}

// ===== COMIC DATA =====
const comics = {
  main: [
    { title: "Train to Catch!", img: null, comingSoon: false, file: "comics/main/train-to-catch/index.html", desc: "After getting into some trouble with 2 bandits callie and the gang find a mysterious train..." },
    { title: "Gone Campin'", img: null, comingSoon: true, desc: "A trip into the woods. what could go wrong?" },
    { title: "Deal of a Lifetime", img: null, comingSoon: true, desc: "Every bargain has a price. This one costs more than you have." },
    { title: "Croak of the Damned", img: null, comingSoon: true, desc: "Its all fun and games, untill you hear the croak.." },
    { title: "It Lurks Below", img: null, comingSoon: true, desc: "The deeper you dive, the louder it breathes." },
    { title: "Double the Trouble", img: null, comingSoon: true, desc: "Two of them. One problem. Infinite chaos." },
  ],
  mini: [
    { title: "poppy's EGGstravaganza", img: null, comingSoon: true, desc: "its easter! most wonderful time of the year! callie and the gang decide to participate in the yearly egg hunt. what could go wrong?" }
  ],
  comedy: [
    { title: "/", img: null, comingSoon: true, desc: "/" },
  ]
};

const categoryNames = { main: "MAIN STORY", mini: "MINI COMICS", comedy: "COMEDY SERIES" };

const spineColors = [
  ["#ff4fd8","#7a00ff"],["#00eaff","#0040ff"],["#ffe600","#ff4f00"],
  ["#ff1f1f","#7a0000"],["#00ff88","#006633"],["#ff4fd8","#00eaff"],
  ["#7a00ff","#0040ff"],["#ffe600","#7a6600"],
];

// ===== INK SPLAT SVG SHAPES =====
function inkSvg(color, size) {
  const shapes = [
    `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 100 100"><polygon points="50,5 61,35 98,35 68,57 79,91 50,70 21,91 32,57 2,35 39,35" fill="${color}"/></svg>`,
    `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="44" ry="28" fill="${color}"/><ellipse cx="72" cy="28" rx="18" ry="11" fill="${color}"/><ellipse cx="24" cy="68" rx="16" ry="9" fill="${color}"/></svg>`,
    `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 100 100"><polygon points="50,2 92,50 50,98 8,50" fill="${color}"/></svg>`,
    `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="${color}"/><circle cx="50" cy="50" r="25" fill="none" stroke="${color}" stroke-width="10"/></svg>`,
  ];
  return shapes[Math.floor(Math.random() * shapes.length)];
}

// ===== PARTICLES =====
function spawnParticles(x, y) {
  const colors = ['#ff4fd8','#00eaff','#ffe600','#ff1f1f','#ffffff','#7a00ff','#00ff88'];
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 10 + Math.random() * 20;
    const angle = Math.random() * 360;
    const dist = 55 + Math.random() * 140;
    const dx = Math.cos(angle * Math.PI/180) * dist;
    const dy = Math.sin(angle * Math.PI/180) * dist;
    const color = colors[Math.floor(Math.random()*colors.length)];
    const drot = (Math.random()-0.5) * 900;
    p.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;--dx:${dx}px;--dy:${dy}px;--drot:${drot}deg;animation-duration:${0.55+Math.random()*0.45}s;`;
    p.innerHTML = inkSvg(color, size);
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1100);
  }
}

// ===== BUILD SHELF =====
function buildShelf(shelfId, category) {
  const shelf = document.getElementById(shelfId);
  comics[category].forEach((comic, i) => {
    const colors = spineColors[i % spineColors.length];
    const spine = document.createElement('div');
    spine.className = 'book-spine';

    const bubbleText = comic.comingSoon
      ? `👁 ${comic.desc.slice(0,55)}${comic.desc.length > 55 ? '…' : ''}`
      : `📖 ${comic.desc.slice(0,55)}${comic.desc.length > 55 ? '…' : ''}`;

    spine.innerHTML = `
      <div class="book-bubble">${bubbleText}</div>
      <div class="book-cover" style="background:linear-gradient(135deg,${colors[0]}22,${colors[1]}44)">
        ${comic.img
          ? `<img src="${comic.img}" alt="${comic.title}">`
          : `<div class="cs-cover" style="background:linear-gradient(135deg,${colors[0]}22,${colors[1]}33,#0a0020)">
               <div class="cs-dots">${Array(9).fill('<div class="cs-dot"></div>').join('')}</div>
               <div class="cs-text">???</div>
             </div>`
        }
      </div>
      <div class="book-title-label">${comic.title}</div>
    `;

    const cover = spine.querySelector('.book-cover');

    // 3D tilt on mouse move
    spine.addEventListener('mousemove', (e) => {
      const rect = spine.getBoundingClientRect();
      const dx = (e.clientX - (rect.left + rect.width/2)) / (rect.width/2);
      const dy = (e.clientY - (rect.top + rect.height/2)) / (rect.height/2);
      cover.style.transform = `perspective(350px) rotateY(${dx*20}deg) rotateX(${-dy*12}deg) translateY(-22px) scale(1.07)`;
    });

    spine.addEventListener('mouseleave', () => {
      cover.style.transform = '';
    });

    spine.addEventListener('mouseenter', () => { playHover(); });

    spine.addEventListener('click', (e) => {
      openDetail(comic, category);
      spawnParticles(e.clientX, e.clientY);
      playWhoosh();
    });

    shelf.appendChild(spine);
  });
}

// ===== CUSTOM CURSOR + INK TRAIL =====
const cursorDot = document.getElementById('cursor-dot');
let lastTrail = 0;
const trailColors = ['#ff4fd8','#00eaff','#ffe600','#7a00ff','#ff1f1f','#00ff88'];
let trailIdx = 0;

document.addEventListener('mousemove', (e) => {
  cursorDot.style.left = e.clientX + 'px';
  cursorDot.style.top = e.clientY + 'px';

  const now = Date.now();
  if (now - lastTrail > 40) {
    lastTrail = now;
    const t = document.createElement('div');
    t.className = 'ink-trail';
    const sz = 7 + Math.random() * 10;
    const color = trailColors[trailIdx++ % trailColors.length];
    const rot = Math.random() * 360;
    t.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;width:${sz}px;height:${sz}px;--rot:${rot}deg;animation-duration:${0.45+Math.random()*0.3}s;`;
    t.innerHTML = inkSvg(color, sz);
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 800);
  }

  // update parallax target
  targetPX = (e.clientX / window.innerWidth  - 0.5) * 14;
  targetPY = (e.clientY / window.innerHeight - 0.5) * 9;
});

// cycle cursor color
setInterval(() => {
  const c = trailColors[Math.floor(Math.random() * trailColors.length)];
  cursorDot.style.background = c;
  cursorDot.style.boxShadow = `0 0 14px ${c}, 0 0 28px ${c}66`;
}, 500);

// ===== DETAIL VIEW =====
function openDetail(comic, category) {
  document.getElementById('bar-title').textContent = comic.title.toUpperCase();
  document.getElementById('bar-category').textContent = categoryNames[category];
  document.getElementById('detail-title').textContent = comic.title;

  const cover = document.getElementById('detail-cover');
  cover.innerHTML = comic.img
    ? `<img src="${comic.img}" alt="${comic.title}" style="width:100%;height:100%;object-fit:cover;">`
    : `<div class="cs-detail-art"><div class="cs-detail-halftone"></div><div class="cs-detail-question">?</div></div>`;

  document.getElementById('detail-badge').innerHTML = comic.comingSoon
    ? `<span class="detail-coming-soon-badge">⚡ COMING SOON ⚡</span>` : '';

  document.getElementById('detail-desc').textContent = comic.desc || '';

  const btn = document.getElementById('btn-read');
  if (comic.comingSoon) {
    btn.className = 'btn-read disabled';
    btn.onclick = () => { triggerComingSoonFlash(); playBoom(); };
  } else {
    btn.className = 'btn-read';
    btn.onclick = () => { if (comic.file) window.open(comic.file, '_blank'); playWhoosh(); };
  }

  document.getElementById('detail-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.body.style.overflow = '';
  playPop();
}

function triggerComingSoonFlash() {
  const msgs = ["COMING SOON!", "NOT YET!", "PATIENCE...", "STAY TUNED!", "HOLD UP!", "SOON™", "KEEP DREAMING!"];
  const overlay = document.getElementById('flash-overlay');
  document.getElementById('flash-text').textContent = msgs[Math.floor(Math.random()*msgs.length)];
  overlay.classList.remove('boom');
  void overlay.offsetWidth;
  overlay.classList.add('boom');
}

document.getElementById('btn-close').addEventListener('click', closeDetail);
document.querySelector('.detail-curtain').addEventListener('click', closeDetail);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// ===== TABS =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('tab-' + this.dataset.tab).classList.add('active');
    playTabClick();
  });
});

// ===== INTRO =====
let introDone = false;
function dismissIntro() {
  if (introDone) return;
  introDone = true;
  playWhoosh();
  const el = document.getElementById('intro-screen');
  el.classList.add('hidden');
  setTimeout(() => el.style.display = 'none', 800);
}
document.getElementById('intro-screen').addEventListener('click', dismissIntro);
setTimeout(dismissIntro, 3800);

// ===== PARALLAX =====
let parallaxX=0, parallaxY=0, targetPX=0, targetPY=0;
const speedRing = document.getElementById('speed-ring');
let speedRingAngle = 0;

function tickParallax() {
  parallaxX += (targetPX - parallaxX) * 0.055;
  parallaxY += (targetPY - parallaxY) * 0.055;
  document.getElementById('parallax-root').style.transform =
    `translate(${parallaxX}px, ${parallaxY}px)`;
  speedRingAngle += 0.013;
  speedRing.style.transform =
    `rotate(${speedRingAngle}rad) translate(${-parallaxX*0.25}px,${-parallaxY*0.25}px)`;
  requestAnimationFrame(tickParallax);
}
tickParallax();

// ===== ANIMATED BG CANVAS =====
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');

  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const orbs = Array.from({length:9}, (_,i) => ({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight,
    r: 80 + Math.random()*180,
    dx: (Math.random()-.5)*.3,
    dy: (Math.random()-.5)*.3,
    color: ['rgba(255,79,216,','rgba(0,234,255,','rgba(120,0,255,','rgba(255,230,0,'][i%4],
    alpha: .04+Math.random()*.07,
    phase: Math.random()*Math.PI*2,
    speed: .003+Math.random()*.005,
  }));

  const panels = Array.from({length:6}, () => ({
    x: Math.random()*innerWidth, y: Math.random()*innerHeight,
    w: 60+Math.random()*120, h: 80+Math.random()*160,
    rot: (Math.random()-.5)*.4, drot: (Math.random()-.5)*.0005,
    dy: -.14-Math.random()*.2,
    alpha: .03+Math.random()*.05,
    color: ['#ff4fd8','#00eaff','#ffe600','#7a00ff','#ff1f1f'][Math.floor(Math.random()*5)],
  }));

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    orbs.forEach(o => {
      o.phase += o.speed;
      o.x += o.dx + Math.sin(o.phase)*.4;
      o.y += o.dy + Math.cos(o.phase*.7)*.3;
      if (o.x < -o.r) o.x = canvas.width+o.r;
      if (o.x > canvas.width+o.r) o.x = -o.r;
      if (o.y < -o.r) o.y = canvas.height+o.r;
      if (o.y > canvas.height+o.r) o.y = -o.r;
      const pulse = .8 + .2*Math.sin(o.phase*1.3);
      const g = ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*pulse);
      g.addColorStop(0, o.color+(o.alpha*1.5)+')');
      g.addColorStop(.5, o.color+o.alpha+')');
      g.addColorStop(1, o.color+'0)');
      ctx.beginPath(); ctx.arc(o.x,o.y,o.r*pulse,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    });
    panels.forEach(p => {
      p.y += p.dy; p.rot += p.drot;
      if (p.y+p.h < -50) { p.y=canvas.height+50; p.x=Math.random()*canvas.width; }
      ctx.save();
      ctx.translate(p.x+p.w/2, p.y+p.h/2);
      ctx.rotate(p.rot);
      ctx.strokeStyle=p.color; ctx.lineWidth=2;
      ctx.globalAlpha=p.alpha;
      ctx.strokeRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.globalAlpha=p.alpha*.3;
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore(); ctx.globalAlpha=1;
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

buildShelf('shelf-main', 'main');
buildShelf('shelf-mini', 'mini');
buildShelf('shelf-comedy', 'comedy');
</script>
